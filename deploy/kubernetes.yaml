apiVersion: apps/v1
kind: Deployment
metadata:
  name: xeip-api
  labels:
    app: xeip-api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: xeip-api
  template:
    metadata:
      labels:
        app: xeip-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: xeip-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: XEIP_ENV
              value: production
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: xeip-api-config
                  key: jwt_issuer
            - name: JWT_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: xeip-api-config
                  key: jwt_audience
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: xeip-api
spec:
  selector:
    app: xeip-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xeip-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xeip-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: xeip-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: xeip-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: xeip-api-config
data:
  jwt_issuer: "https://idp.example.com/"
  jwt_audience: "xeip-api"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: xeip-api-ingress
spec:
  podSelector:
    matchLabels:
      app: xeip-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
